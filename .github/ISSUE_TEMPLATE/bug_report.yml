name: 不具合報告
description: 再現可能な不具合を報告します。
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        資格情報、個人情報、実際のタブ名、ローカルログ、音声データは投稿しないでください。
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題が起きるまでの手順を記載してください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待した動作
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows のバージョン
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET SDK のバージョン
      placeholder: 8.0.423
    validations:
      required: true
  - type: dropdown
    id: vivaldi
    attributes:
      label: Vivaldi 連携
      options:
        - 使用していない
        - 使用している
        - 不明
    validations:
      required: true
  - type: checkboxes
    id: sensitive-data
    attributes:
      label: 確認
      options:
        - label: 機密情報・個人情報・実際のタブ名・ローカルログ・音声データを含めていません。
          required: true
